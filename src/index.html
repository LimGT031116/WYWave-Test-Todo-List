<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Todo List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>

  <div class="container mt-4">

    <!-- Page title -->
    <div class="row mb-3">
      <div class="col text-center">
        <h1 class="display-6 fw-bold text-center">My Todo List</h1>
      </div>
    </div>

    <!-- Search and filters -->
    <div class="row mb-3">

      <!-- Search input -->
      <div class="col-8 mb-2">
        <input type="text" id="searchTitle" class="form-control" placeholder="Search by title...">
      </div>

      <!-- Filter by priority -->
      <div class="col-2 mb-2">
        <select id="filterPriority" class="form-select">
          <option value="">All Priorities</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>

      <!-- Filter by status -->
      <div class="col-2 mb-2">
        <select id="filterStatus" class="form-select">
          <option value="">All Status</option>
          <option value="Complete">Complete</option>
          <option value="Pending">Pending</option>
        </select>
      </div>
    </div>

    <!-- Table header -->
    <table class="table mb-0 table-striped table-hover custom-table">
      <thead>
        <tr>
          <th style="width:5%;">Status</th>
          <th style="width:25%;">Title</th>
          <th style="width:45%;">Description</th>
          <th style="width:10%;">Priority</th>
          <th style="width:15%;">Actions</th>
        </tr>
      </thead>
    </table>

    <!-- Todo list container -->
    <div class="list-container" style="max-height:70vh; overflow-y:auto;">
      <table class="table mb-0 table-striped table-hover custom-table">
        <tbody id="list">
          <!-- Todo items will be added here by JS -->
        </tbody>
      </table>
    </div>

    <!-- Add button -->
    <div class="row">
      <div class="col">
        <button id="addBtn" class="btn w-100 custom-btn">
          Add Todo (+)
        </button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/index.js"></script>
</body>

</html>
